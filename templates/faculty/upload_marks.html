<!-- templates/faculty/upload_marks.html -->
{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">{{ subject.name }} - Upload Marks</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Exam Type:</label>
            <select name="exam_type" class="form-control" required>
                {% for key, label in exam_choices %}
                    <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Maximum Marks:</label>
            <input type="number" name="max_marks" class="form-control" min="1" step="0.01" required>
        </div>

        <div class="mb-3">
            <label><strong>Enter Marks for Students</strong></label>
            {% for student in students %}
                <div class="form-group mb-2">
                    <label>{{ student.user.get_full_name }} ({{ student.roll_no }})</label>
                    <input 
                        type="number" 
                        step="0.01" 
                        min="0"
                        name="marks_{{ student.id }}" 
                        class="form-control"
                        placeholder="Enter marks obtained"
                    >
                </div>
            {% endfor %}
        </div>

        <button class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock %}
